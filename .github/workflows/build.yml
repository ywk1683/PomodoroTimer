name: Build DLL

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Visual Studio
      uses: microsoft/setup-msbuild@v2

    - name: Build x64
      run: |
        msbuild PomodoroTimer.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0 /t:Rebuild /v:normal

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: PomodoroTimer-x64
        path: bin\x64\Release\PomodoroTimer.dll
        compression-level: 0
